name: LightDash
version: "0.6.3"
slug: lightdash
description: Lightweight Home Assistant dashboard renderer — define custom dashboards in YAML
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:view-dashboard
panel_title: LightDash
startup: application
boot: auto
ports:
  8000/tcp: 8001
ports_description:
  8000/tcp: Direct HTTP access (disable for production — open port outside LAN)
options:
  public_host: ""
  public_port: "8001"
schema:
  public_host: str
  public_port: str