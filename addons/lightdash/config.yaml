name: LightDash
version: "0.3.2"
slug: lightdash
description: Lightweight Home Assistant dashboard renderer — define custom dashboards in YAML
arch:
  - aarch64
  - amd64
init: false
homeassistant_api: true
ingress: true
ingress_port: 8000
panel_icon: mdi:view-dashboard
panel_title: LightDash
startup: application
boot: auto
ports:
  8000/tcp: null
ports_description:
  8000/tcp: Direct HTTP access (disable for production)
options:
  dashboards: []
schema:
  dashboards:
    - name: str
      title: str
      yaml: str